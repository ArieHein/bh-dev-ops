name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/tools/markdown/**"
      - ".github/instructions/**"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - ".github/tools/markdown/**"
      - ".github/instructions/**"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install markdownlint-cli2
        run: npm install --no-save markdownlint-cli2

      - name: Lint markdown
        run: npx markdownlint-cli2 --config .github/tools/markdown/markdownlint-cli2.jsonc "**/*.md"
