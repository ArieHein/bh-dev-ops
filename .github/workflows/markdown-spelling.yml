name: Markdown Spelling Info

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/tools/markdown/**"
      - ".github/instructions/**"
      - ".github/workflows/markdown-spelling.yml"
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - ".github/tools/markdown/**"
      - ".github/instructions/**"
      - ".github/workflows/markdown-spelling.yml"

permissions:
  contents: read

jobs:
  spellcheck-info:
    name: Spellcheck markdown files (informational)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install cspell
        run: npm install --no-save cspell

      - name: Spellcheck markdown
        id: spellcheck
        continue-on-error: true
        run: npx cspell lint --config .github/tools/markdown/cspell.json "**/*.md"

      - name: Report spelling findings
        if: steps.spellcheck.outcome == 'failure'
        run: |
          echo "### Spelling findings (informational)" >> "$GITHUB_STEP_SUMMARY"
          echo "cspell reported findings. This workflow is non-blocking for now." >> "$GITHUB_STEP_SUMMARY"
          echo "Use en-US spelling where possible and update dictionaries when needed." >> "$GITHUB_STEP_SUMMARY"

      - name: Confirm non-blocking behavior
        if: steps.spellcheck.outcome == 'failure'
        run: echo "Spelling findings detected; continuing without failure by policy."